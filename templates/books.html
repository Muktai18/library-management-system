<!DOCTYPE html>
<html>
<head>
    <title>Books Management</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="add_book">

<div class="sidebar">

    <h2><i class="fa-solid fa-book"></i> Library</h2>

    <ul>
        <li><a href="/dashboard"><i class="fa-solid fa-house"></i> Dashboard</a></li>
        <li><a href="/books"><i class="fa-solid fa-book-open"></i> Books</a></li>
        <li><a href="/issue_book"><i class="fa-solid fa-bookmark"></i> Issue Book</a></li>
        <li><a href="/logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
    </ul>

</div>

<div class="main-content">

    <div class="topbar">
        <h1>Books Management</h1>
    </div>

    <form method="GET" action="/books">

        <input type="text"
        name="search"
        placeholder="Search Books">

        <button type="submit">Search</button>

    </form>

    <br>

    <a href="/add_book">
        <button>Add New Book</button>
    </a>

    <br><br>

    <table>

        <tr>
            <th>ID</th>
            <th>Book Name</th>
            <th>Author</th>
            <th>Category</th>
            <th>Quantity</th>
            <th>Action</th>
        </tr>

        {% for book in books %}

        <tr>
            <td>{{ book[0] }}</td>
            <td>{{ book[1] }}</td>
            <td>{{ book[2] }}</td>
            <td>{{ book[3] }}</td>
            <td>{{ book[4] }}</td>

           <td>

    <div class="action-buttons">

        <a href="/edit_book/{{ book[0] }}">
            <button>Edit</button>
        </a>

        <a href="/delete_book/{{ book[0] }}">
            <button>Delete</button>
        </a>

    </div>

</td>
        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
