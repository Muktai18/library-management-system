<!DOCTYPE html>
<html>
<head>
    <title>Edit Book</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="login-container">

    <h1>Edit Book</h1>

    <form method="POST">

        <input type="text"
        name="book_name"
        value="{{ book[1] }}"
        required>

        <input type="text"
        name="author"
        value="{{ book[2] }}"
        required>

        <input type="text"
        name="category"
        value="{{ book[3] }}"
        required>

        <input type="number"
        name="quantity"
        value="{{ book[4] }}"
        required>

        <button type="submit">Update Book</button>

    </form>

</div>

</body>
</html>
